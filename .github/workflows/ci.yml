name: Continuous Integration Security Scan

# 1. TRIGGER EVENT: Run this pipeline automatically every time code is pushed to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # 2. RUNNING ENVIRONMENT: Spin up a clean, temporary cloud runner managed by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your source code files onto the cloud runner
    - name: Checkout Codebase
      uses: actions/checkout@v4

    # Step 2: Set up an official Python environment on the Linux runner
    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Clean install all required software dependencies
    - name: Install Application Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt google-genai pytest fastapi httpx uvicorn

    # Step 4: Validate that your Python application compiles and packages perfectly into Docker
    - name: Build Local Container Package
      run: |
        docker build -t opsmind-ai-guardrail:test .